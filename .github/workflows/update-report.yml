name: Update Daily Report
on:
  schedule:
    - cron: '*/5 * * * *'  # 临时：每5分钟，验证 cron 是否生效后改回每小时
  workflow_dispatch:        # 手动触发
permissions:
  contents: write           # 推送更新
  pages: write              # Pages 部署
  id-token: write           # Pages OIDC
concurrency:
  group: update-report
  cancel-in-progress: false
jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch data & generate HTML
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python3 scripts/update_report.py

      - name: Commit & push changes (using PAT to trigger deployment)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "daily-report-bot"
          git config user.email "bot@daily-report.dev"
          git add index.html
          git diff --cached --quiet && echo "No data changes" && exit 0 || git commit -m "feat: auto-update daily report data"
          # 使用 PAT 推送，确保触发 Pages 部署流水线
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }} HEAD:main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4